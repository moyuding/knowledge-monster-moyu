# Railway 配置 - 修复版
# 明确指定路径和命令

[build]
builder = "nixpacks"
buildCommand = "cd knowledge-monster && npm install"
startCommand = "node knowledge-monster/backend/src/index.js"

[deploy]
healthcheckPath = "/health"

[variables]
NODE_ENV = "production"
PORT = "3000"
JWT_SECRET = "temporary-jwt-secret-change-this-in-production"
CORS_ORIGIN = "*"

# 临时值
SUPABASE_URL = "http://localhost:5432"
SUPABASE_ANON_KEY = "dummy"
SUPABASE_SERVICE_KEY = "dummy"
DEEPSEEK_API_KEY = "dummy"