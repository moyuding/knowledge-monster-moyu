# Railway 配置 - 使用 Docker 构建器
# 如果 Nixpacks 失败，使用这个

[build]
builder = "docker"
dockerfile = "knowledge-monster/deploy/Dockerfile"

[deploy]
healthcheckPath = "/health"

[variables]
NODE_ENV = "production"
PORT = "3000"
JWT_SECRET = "temporary-jwt-secret-change-this-in-production"
CORS_ORIGIN = "*"

# 临时值
SUPABASE_URL = "http://localhost:5432"
SUPABASE_ANON_KEY = "dummy"
SUPABASE_SERVICE_KEY = "dummy"
DEEPSEEK_API_KEY = "dummy"