version: '3.8'

services:
  # Supabase数据库服务
  supabase:
    image: supabase/postgres:15
    container_name: knowledge-monster-db
    environment:
      POSTGRES_DB: knowledge_monster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge-monster-network

  # 后端API服务
  backend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      target: backend-builder
    container_name: knowledge-monster-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      SUPABASE_URL: http://supabase:5432
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtub3dsZWRnZS1tb25zdGVyIiwiYXBwIjoic3VwYWJhc2UtYXBwIiwic3ViIjoic3VwYWJhc2UtdXNlciIsImV4cCI6MTYxNjE5MDIyNn0.DUMMY_KEY_DO_NOT_USE_IN_PRODUCTION
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtub3dsZWRnZS1tb25zdGVyIiwiYXBwIjoic3VwYWJhc2UtYXBwIiwic3ViIjoic3VwYWJhc2UtdXNlciIsImV4cCI6MTYxNjE5MDIyNn0.DUMMY_KEY_DO_NOT_USE_IN_PRODUCTION
      JWT_SECRET: development-jwt-secret-key
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      DEEPSEEK_API_KEY: dummy-key-for-development
      DEEPSEEK_API_URL: http://ai-grader:3001
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app/backend
      - ../ai-grader:/app/ai-grader
      - ../logs:/app/logs
    depends_on:
      supabase:
        condition: service_healthy
    networks:
      - knowledge-monster-network
    command: npm run dev

  # AI批改服务
  ai-grader:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      target: ai-builder
    container_name: knowledge-monster-ai-grader
    environment:
      NODE_ENV: development
      PORT: 3001
      DEEPSEEK_API_KEY: dummy-key-for-development
    ports:
      - "3001:3001"
    volumes:
      - ../ai-grader:/app/ai-grader
      - ../logs:/app/logs
    networks:
      - knowledge-monster-network
    command: npm start

  # 前端开发服务器
  frontend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      target: frontend-builder
    container_name: knowledge-monster-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app/frontend
      - ../logs:/app/logs
    depends_on:
      - backend
    networks:
      - knowledge-monster-network
    command: npm run dev

  # 管理工具（可选）
  adminer:
    image: adminer:latest
    container_name: knowledge-monster-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: supabase
    depends_on:
      - supabase
    networks:
      - knowledge-monster-network

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: knowledge-monster-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - knowledge-monster-network

  # 监控工具（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: knowledge-monster-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - knowledge-monster-network

  # 日志收集（可选）
  loki:
    image: grafana/loki:latest
    container_name: knowledge-monster-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
    networks:
      - knowledge-monster-network

  # 监控面板（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: knowledge-monster-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - knowledge-monster-network

networks:
  knowledge-monster-network:
    driver: bridge
    name: knowledge-monster-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local