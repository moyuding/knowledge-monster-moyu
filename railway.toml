# Railway 配置 - 使用 Nixpacks 构建
# 依赖 nixpacks.toml 配置文件

[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/health"

[variables]
NODE_ENV = "production"
PORT = "3000"
JWT_SECRET = "temporary-jwt-secret-change-this-in-production"
CORS_ORIGIN = "*"

# 临时值
SUPABASE_URL = "http://localhost:5432"
SUPABASE_ANON_KEY = "dummy"
SUPABASE_SERVICE_KEY = "dummy"
DEEPSEEK_API_KEY = "dummy"