# 极简 Railway 配置 - 避免超时

[build]
builder = "nixpacks"

# 明确指定快速构建
[build.args]
NIXPACKS_BUILD_TIMEOUT = "600"  # 10分钟
NIXPACKS_CACHE = "true"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30  # 缩短健康检查超时

[variables]
NODE_ENV = "production"
PORT = "3000"
JWT_SECRET = "temporary-secret-for-now"

# 只保留必要变量，其他用默认值
CORS_ORIGIN = "*"